name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Dummy values for build (not used at runtime, just needed to compile)
  DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
  AUTH_SECRET: "ci-build-secret-not-real"
  NEXT_PUBLIC_COLLABORATION_URL: "ws://localhost:1234"
  COLLABORATION_JWT_SECRET: "ci-build-secret-not-real"
  GROQ_API_KEY: "gsk_fake_ci_key"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Build
        run: npm run build

  collab-server:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm install

      - name: Type check server
        run: cd server && npx tsc --noEmit
